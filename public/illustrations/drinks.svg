  <circle cx="20" cy="48" r="8" stroke-width="1.5"/>
  <circle cx="20" cy="48" r="4" stroke-width="1"/>
  <line x1="20" y1="40" x2="20" y2="56" stroke-width="0.8"/>
  <line x1="12" y1="48" x2="28" y2="48" stroke-width="0.8"/>
  <line x1="14" y1="42" x2="26" y2="54" stroke-width="0.8"/>
  <line x1="14" y1="54" x2="26" y2="42" stroke-width="0.8"/>
  <!-- Cola can middle -->
  <rect x="50" y="50" width="24" height="50" rx="4" stroke-width="2"/>
  <!-- Can top dome -->
  <path d="M50 50 Q62 44 74 50" stroke-width="2"/>
  <!-- Can pull tab -->
  <path d="M62 46 Q64 44 66 46 L66 50 L62 50 Z" stroke-width="1.5"/>
  <path d="M60 44 Q62 42 64 44" stroke-width="1.3"/>
  <!-- Can label lines -->
  <line x1="52" y1="62" x2="72" y2="62" stroke-width="1.2"/>
  <line x1="52" y1="70" x2="72" y2="70" stroke-width="1"/>
  <line x1="54" y1="66" x2="70" y2="66" stroke-width="0.8"/>
  <!-- Can brand area -->
  <path d="M55 74 Q62 72 69 74" stroke-width="1"/>
  <path d="M56 78 Q62 76 68 78" stroke-width="1"/>
  <!-- Tall glass right -->
  <path d="M76 40 L80 105 Q80 110 86 110 L100 110 Q106 110 106 105 L112 40 Z" stroke-width="2"/>
