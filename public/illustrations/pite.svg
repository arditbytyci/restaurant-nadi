<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 120 120" fill="none" stroke="#450b1d" stroke-linecap="round" stroke-linejoin="round">
  <!-- Rolling pin -->
  <rect x="8" y="18" width="68" height="14" rx="7" stroke-width="2"/>
  <line x1="8" y1="25" x2="76" y2="25" stroke-width="1" opacity="0.4"/>
  <!-- Rolling pin handles -->
  <rect x="2" y="20" width="8" height="10" rx="4" stroke-width="1.8"/>
  <rect x="74" y="20" width="8" height="10" rx="4" stroke-width="1.8"/>
  <!-- Dough sheet being rolled -->
  <path d="M10 32 Q40 28 76 32 Q80 35 78 40 Q40 36 8 40 Q6 37 10 32Z" stroke-width="1.5"/>
  <!-- Pite dish - round -->
  <ellipse cx="70" cy="82" rx="42" ry="12" stroke-width="2.2"/>
  <path d="M28 82 L32 60 Q70 54 108 60 L112 82" stroke-width="2.2"/>
  <!-- Phyllo layers visible from side -->
  <path d="M32 78 Q70 72 108 78" stroke-width="1.2"/>
  <path d="M31 74 Q70 68 109 74" stroke-width="1.2"/>
  <path d="M31 70 Q70 64 109 70" stroke-width="1.2"/>
  <path d="M32 66 Q70 60 108 66" stroke-width="1.2"/>
  <!-- Top of pite - scored/marked -->
  <ellipse cx="70" cy="60" rx="38" ry="10" stroke-width="2"/>
  <!-- Score marks on top -->
  <line x1="50" y1="57" x2="48" y2="63" stroke-width="1.2"/>
  <line x1="60" y1="55" x2="58" y2="61" stroke-width="1.2"/>
  <line x1="70" y1="54" x2="68" y2="60" stroke-width="1.2"/>
  <line x1="80" y1="55" x2="78" y2="61" stroke-width="1.2"/>
  <line x1="90" y1="57" x2="88" y2="63" stroke-width="1.2"/>
  <!-- Golden crinkle texture on top -->
  <path d="M35 60 Q42 57 50 60 Q58 63 66 60 Q74 57 82 60 Q90 63 98 60 Q103 58 105 60" stroke-width="1" opacity="0.7"/>
  <!-- Steam -->
  <path d="M55 54 Q53 46 56 40 Q58 34 55 28" stroke-width="1.3"/>
  <path d="M70 52 Q72 44 69 38 Q67 32 70 26" stroke-width="1.3"/>
  <path d="M85 54 Q87 46 84 40 Q82 34 85 28" stroke-width="1.3"/>
  <!-- Cheese/filling oozing -->
  <path d="M105 68 Q110 72 109 78" stroke-width="1.5"/>
  <path d="M35 68 Q30 72 31 78" stroke-width="1.5"/>
  <!-- Flour dusting dots around rolling area -->
  <circle cx="12" cy="45" r="1.5" stroke-width="1.5"/>
  <circle cx="20" cy="42" r="1" stroke-width="1.2"/>
  <circle cx="16" cy="48" r="1" stroke-width="1.2"/>
</svg>
