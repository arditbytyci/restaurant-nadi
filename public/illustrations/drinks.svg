  <circle cx="86" cy="72" r="2" stroke-width="1.2"/>
  <circle cx="94" cy="65" r="2" stroke-width="1.2"/>
  <circle cx="100" cy="78" r="2" stroke-width="1.2"/>
  <circle cx="88" cy="84" r="1.5" stroke-width="1"/>
  <circle cx="96" cy="88" r="1.5" stroke-width="1"/>
  <!-- Straw right with bend -->
  <path d="M100 108 L104 65 Q105 55 112 48" stroke-width="1.8"/>
  <!-- Cherry garnish on right -->
  <circle cx="112" cy="44" r="5" stroke-width="1.8"/>
  <path d="M112 39 Q110 32 106 28" stroke-width="1.5"/>
  <!-- Leaf on cherry stem -->
  <path d="M108 33 Q104 30 106 26 Q110 29 108 33Z" stroke-width="1.2"/>
