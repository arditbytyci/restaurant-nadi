  <line x1="44" y1="105" x2="52" y2="22" stroke-width="1.8"/>
  <!-- Straw stripes -->
  <line x1="45" y1="98" x2="52" y2="96" stroke-width="1" opacity="0.5"/>
  <line x1="46" y1="88" x2="53" y2="86" stroke-width="1" opacity="0.5"/>
  <line x1="47" y1="78" x2="54" y2="76" stroke-width="1" opacity="0.5"/>
  <line x1="48" y1="68" x2="55" y2="66" stroke-width="1" opacity="0.5"/>
  <line x1="49" y1="58" x2="56" y2="56" stroke-width="1" opacity="0.5"/>
